{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-shield-lock me-2"></i>Admin Login</h2>
    <p>Restricted access – authorized personnel only</p>
  </div>
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card">
        <div class="card-header"><i class="bi bi-lock me-2"></i>Administrator Login</div>
        <div class="card-body p-4">
          {% if error %}
          <div class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}
          <form method="POST">
            <div class="mb-3">
              <label><i class="bi bi-person me-1"></i>Username</label>
              <input type="text" class="form-control" name="username" placeholder="Admin username" required/>
            </div>
            <div class="mb-4">
              <label><i class="bi bi-key me-1"></i>Password</label>
              <input type="password" class="form-control" name="password" placeholder="Password" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
              <i class="bi bi-shield-check me-2"></i>Login as Admin
            </button>
          </form>
          <hr/>
          <div class="alert alert-info mb-0 small">
            <strong>Demo credentials:</strong><br>
            Username: <code>admin</code> | Password: <code>admin123</code>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
